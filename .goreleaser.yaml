version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: git-w
    binary: git-w
    main: .
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: git-w
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

release:
  mode: keep-existing

changelog:
  disable: true

homebrew_casks:
  - name: git-w
    binaries:
      - git-w
    repository:
      owner: robertwritescode
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/robertwritescode/git-w"
    description: "Git plugin for managing meta-repo workspaces"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/git-w"]
          end
