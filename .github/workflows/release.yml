name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  goreleaser:
    name: goreleaser
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' && needs.release-please.outputs.tag_name != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -race -count=1 ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          cask: false
          core: false

      # Maintainer note: this post-GoReleaser cask normalization is documented in
      # README.md -> "Release pipeline (maintainers)" -> "Troubleshooting".
      - name: Auto-fix cask style and push
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          git config --global --unset-all http.https://github.com/.extraheader || true
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/robertwritescode/homebrew-tap.git" homebrew-tap

          cd homebrew-tap
          brew style --fix Casks/git-w.rb

          if git diff --quiet -- Casks/git-w.rb; then
            echo "No cask style changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/git-w.rb
          git commit -m "chore(cask): auto-fix style for ${{ needs.release-please.outputs.tag_name }}"
          git push "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/robertwritescode/homebrew-tap.git" main
